<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestbook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>&#128214; Guestbook</h1>
      <p class="subtitle">Leave a message for future visitors</p>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <h2>Sign the Guestbook</h2>
      <form id="guestbook-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" placeholder="Write your message..." required maxlength="500" rows="4"></textarea>
        </div>
        <button type="submit" id="submit-btn">Post Message</button>
      </form>
      <div id="form-status" class="status-message"></div>
    </section>

    <section class="entries-section">
      <div class="entries-header">
        <h2>Guest Messages</h2>
        <span id="entry-count" class="entry-count">0 messages</span>
      </div>
      <div id="entries-list" class="entries-list">
        <p class="loading">Loading messages...</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 Guestbook Application. Built with Node.js and Express.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
